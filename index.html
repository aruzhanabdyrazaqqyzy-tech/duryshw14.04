<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Tip calculator app</title>
  <style>

  </style>
</head>

<body class="dene">

  <img src="./images/logo.svg" alt="" class="h1">

  <div class="container">

    <div class="left">

      <div class="first">
        <h2 class="h2">Bill</h2>
        <input type="search" class="search">
      </div>

      <div class="second">
        <h2 class="heki">Select Tip %</h2>

        <div class="box">
          <div class="birbox">
            <button>5%</button>
            <button>10%</button>
            <button>15%</button>
          </div>
          <div class="ekibox">
            <button>25%</button>
            <button>50%</button>
            <button>Custom</button>
          </div>
        </div>

      </div>
      <div class="third">
        <h2 class="h2">Number of People</h2>
        <input type="search" class="search">
      </div>

    </div>
    <div class="right">
      <div class="top">

        <div class="bir">

          <div class="asty">
            <h3>Tip Amount</h3>
            <p>/ person</p>
          </div>
          <h1>$0.00</h1>

        </div>

        <div class="eki">

          <div class="azty">
            <div class="column">
              <h2>Total</h2>
              <p>/ person</p>
            </div>
            <h1>$0.00</h1>
          </div>


        </div>

      </div>
      <button>Reset</button>
    </div>


  </div>
</body>
<script src="script.js"></script>

</html>
